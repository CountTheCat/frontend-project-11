<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS Агрегатор</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="container mt-5">
        <h1 class="mb-4">RSS Агрегатор</h1>
        <div class="row">
          <div class="col-12 col-md-8 col-lg-6 mx-auto">
            <div class="card">
              <div class="card-body">
                <form id="rss-form">
                  <div class="mb-3">
                    <label for="url-input" class="form-label">Ссылка RSS</label>
                    <input
                      type="url"
                      class="form-control"
                      id="url-input"
                      placeholder="Введите URL RSS-потока"
                      required
                    />
                    <div class="invalid-feedback">Пожалуйста, введите корректный URL</div>
                  </div>
                  <button type="submit" class="btn btn-primary">Добавить</button>
                </form>
              </div>
            </div>
            <div id="feeds-container" class="mt-4"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
