<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS Агрегатор</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="container mt-5">
        <div class="row">
          <div class="col-12 col-md-8 col-lg-6 mx-auto">
            <h1 class="mb-3">RSS агрегатор</h1>
            <p class="mb-4 text-muted">Начните читать RSS сегодня! Это легко, это красиво.</p>
            <div class="card">
              <div class="card-body">
                <form id="rss-form">
                  <div class="mb-3">
                    <label for="url-input" class="form-label">Ссылка RSS</label>
                    <div class="row">
                      <div class="col">
                        <input
                          type="url"
                          class="form-control"
                          id="url-input"
                          required
                        />
                        <div class="invalid-feedback"></div>
                      </div>
                      <div class="col-auto">
                        <button type="submit" class="btn btn-primary">Добавить</button>
                      </div>
                    </div>
                  </div>
                </form>
                <p class="text-muted small mb-0">Пример: https://lorem-rss.hexlet.app/feed</p>
                <p id="feedback-message" class="small mb-0 mt-1"></p>
              </div>
            </div>
            <div id="feeds-container" class="mt-4">
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
