<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS Агрегатор</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="bg-dark text-white py-5 mb-4">
        <div class="container">
          <div class="row">
            <div class="col-12 col-md-8 col-lg-6 mx-auto">
              <h1 class="display-5 fw-bold mb-2">RSS агрегатор</h1>
              <p class="lead mb-0 text-white-50">Начните читать RSS сегодня! Это легко, это красиво.</p>
            </div>
          </div>
        </div>
      </div>

      <div class="container">
        <div class="row">
          <div class="col-12 col-md-8 col-lg-6 mx-auto">
            <div class="card border-0 shadow-sm">
              <div class="card-body">
                <form id="rss-form">
                  <div class="mb-3">
                    <label for="url-input" class="form-label">Ссылка RSS</label>
                    <div class="row">
                      <div class="col">
                        <input
                          type="text"
                            class="form-control"
                             id="url-input"
                              aria-label="url"
                                required
                                  />
                        <div class="invalid-feedback"></div>
                      </div>
                      <div class="col-auto">
                        <button type="submit" class="btn btn-primary" id="submit-button">Добавить</button>
                      </div>
                    </div>
                  </div>
                </form>
                <p class="text-muted small mb-0">Пример: https://lorem-rss.hexlet.app/feed</p>
                <p id="feedback-message" class="feedback small mb-0 mt-1"></p>
              </div>
            </div>
            <div class="row mt-4">
              <div class="col-md-8 posts" id="posts-container">
              </div>
              <div class="col-md-4 feeds" id="feeds-container">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modal-title"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="modal-description"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
            <a href="#" class="btn btn-primary" id="modal-link" target="_blank" rel="noopener noreferrer">Читать полностью</a>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
